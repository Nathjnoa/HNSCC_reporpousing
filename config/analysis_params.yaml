# ============================================================
# HNSCC Drug Repurposing — Parámetros de Análisis
# Modificar aquí para análisis de sensibilidad
# ============================================================

# --- Proteómica DE (scripts 01-02) ---
de:
  log2fc_threshold: 1.0          # |log2FC| mínimo para proteínas significativas
  adj_pval_threshold: 0.05       # FDR (Benjamini-Hochberg)
  missing_filter_pct: 0.50       # Eliminar proteínas con >50% missing en cualquier grupo
  imputation_method: "MinProb"   # Opciones: MinProb, QRILC, kNN
  normalization: "median"        # Opciones: median, vsn, quantile

# --- Enriquecimiento de rutas (script 04) ---
pathway:
  pval_cutoff: 0.05
  qval_cutoff: 0.20
  min_gs_size: 10
  max_gs_size: 500
  simplify_cutoff: 0.70          # Umbral para simplify() en GO (evitar redundancia)

# --- ChEMBL (script 05) ---
chembl:
  min_phase: 3                        # Fase clínica mínima (3=Fase III, 4=Aprobado)

# --- Open Targets (script 06) ---
opentargets:
  min_hnscc_score: 0.2          # Minimum overall association score for HNSCC

# --- L2S2 / LINCS L1000 (script 07) ---
# Nota: CMap2 reemplazado por L2S2 (Evangelista et al., NAR 2025).
# Score: reversal_score en [-1, 0] (mas negativo = mejor reversor).
cmap:
  connectivity_score_threshold: -90   # Score < -90 = reversor potente
  adj_pval_threshold: 0.05
  method: "LINCS"                     # Opciones: LINCS, CMAP2

# --- Red PPI STRING (script 09) ---
network:
  string_version: "12.0"
  string_score_threshold: 700         # Score combinado 0-1000 (700 = alta confianza)
  hub_percentile: 90                  # Top 10% por grado de nodo = hub

# --- Priorización multi-criterio (script 10) ---
# CAMBIO v2: weight_evidence eliminado (sesgo de publicación + circularidad con revisión manual).
# El 15% se redistribuyó proporcionalmente entre los 3 componentes de datos propios:
#   pi_stat (proteómica): 0.25 + 0.075 = 0.325
#   network_centrality:   0.15 + 0.045 = 0.195
#   cmap_connectivity:    0.10 + 0.030 = 0.130
scoring:
  weight_pi_stat: 0.40           # señal proteómica (logFC × significancia)
  weight_clinical_phase: 0.20    # fase FDA (independiente de literatura HNSCC)
  weight_cmap_connectivity: 0.10 # reversión de firma transcriptómica (L2S2)
  weight_pathway_relevance: 0.15 # solapamiento con vías enriquecidas en HNSCC
  weight_network_centrality: 0.15 # centralidad en red PPI STRING
  # Suma = 1.00 (verificado en script 10)

# --- Candidatos finales (script 10) ---
candidates:
  top_n: 35                           # Ampliado para análisis LOD + sensibilidad más informativo
  min_databases: 2                    # Mínimo de bases de datos de soporte

# --- Fase clínica → score (script 10) ---
clinical_phase_scores:
  "4": 1.00    # Aprobado
  "3": 0.75    # Fase 3
  "2": 0.50    # Fase 2
  "1": 0.25    # Fase 1
  "0": 0.00    # Pre-clínico / desconocido

# --- Exclusiones de Top 20 (fármacos no-antitumorales) ---
exclusions:
  # Fármacos cuyo mecanismo no tiene plausibilidad antitumoral en HNSCC
  drugs:
    - "FOMEPIZOLE"                              # Antídoto metanol (ADH1B)
    - "ADUCANUMAB"                              # Anti-amiloide Alzheimer (APP)
    - "LECANEMAB"                               # Anti-amiloide Alzheimer (APP)
    - "DONANEMAB"                               # Anti-amiloide Alzheimer (APP)
    - "TRAMIPROSATE"                            # Anti-amiloide Alzheimer (APP)
    - "CRENEZUMAB"                              # Anti-amiloide Alzheimer (APP)
    - "GANTENERUMAB"                            # Anti-amiloide Alzheimer (APP)
    - "PREGABALIN"                              # Gabapentinoide analgésico (CACNA2D1)
    - "GABAPENTIN ENACARBIL"                    # Gabapentinoide analgésico (CACNA2D1)
    - "GABAPENTIN"                              # Gabapentinoide analgésico (CACNA2D1)
    - "SULOCTIDIL"                              # Vasodilatador/gabapentinoide (CACNA2D1)
    - "ARGATROBAN"                              # Anticoagulante (F2)
    - "ANTITHROMBIN ALFA"                       # Anticoagulante (F2)
    - "DESIRUDIN"                               # Anticoagulante (F2)
    - "LEPIRUDIN"                               # Anticoagulante (F2)
    - "DABIGATRAN ETEXILATE MESYLATE"           # Anticoagulante (F2)
    - "XIMELAGATRAN"                            # Anticoagulante (F2)
    - "COLLAGENASE CLOSTRIDIUM HISTOLYTICUM"    # enzima tópica Dupuytren — no sistémico
    - "OCRIPLASMIN"                             # proteasa intravítrea — no oncológico
    - "TECHNETIUM TC 99M SUCCIMER"              # agente diagnóstico de imagen
    - "MAVACAMTEN"                              # Inhibidor miosina cardíaca MYH7 — target muscular (artefacto tisular HNSCC)
    - "OMECAMTIV MECARBIL"                      # Activador miosina cardíaca MYH7 — target muscular (artefacto tisular HNSCC)
    - "DANICAMTIV"                              # Activador miosina esquelética MYH7 — target muscular (artefacto tisular HNSCC)
    - "RELDESEMTIV"                             # Activador troponina esquelética TNNT3 — target muscular (artefacto tisular HNSCC)
    - "TIRASEMTIV"                              # Activador troponina esquelética TNNT3 — target muscular (artefacto tisular HNSCC)
    - "LEVOSIMENDAN"                            # Sensibilizador calcio TNNI3/TNC — target muscular (artefacto tisular HNSCC)
    # Proteínas plasmáticas / vasculares: señal de contaminación de sangre o
    # composición tisular (normal adyacente con vasculatura), no biología tumoral.
    - "CAPLACIZUMAB"                            # Anti-VWF (trombosis TTP) — sin mecanismo antitumoral
    - "VON WILLEBRAND FACTOR HUMAN"             # Reemplazo proteico VWF — coagulopatía, no oncológico
    - "VONICOG ALFA"                            # Reemplazo proteico VWF — coagulopatía, no oncológico
    - "EGAPTIVON PEGOL"                         # Anti-VWF aptámero experimental — sin mecanismo antitumoral
    # Fibrinógeno (FGA/FGB/FGG) — proteína plasmática abundante; señal de
    # contaminación de sangre en biopsia DIA, no oncogénesis.
    - "ALFIMEPRASE"                             # Fibrinolítico FGA/FGB/FGG — agente de coágulo, sin mecanismo antitumoral
    - "ANCROD"                                  # Fibrinolítico FGA/FGB/FGG — veneno serpiente desfibrinogenante, sin mecanismo antitumoral
    - "FIBRINOGEN, HUMAN"                       # Reemplazo proteico FGA/FGB/FGG — hemostático, no oncológico
    - "PLASMINOGEN"                             # Precursor plasmina FGA — manejo trombosis, sin mecanismo antitumoral
    - "TIROFIBAN"                               # Antiagregante FGA/integrina — manejo SCA, sin mecanismo antitumoral HNSCC
    - "EPTIFIBATIDE"                            # Antiagregante FGA/integrina — manejo SCA, sin mecanismo antitumoral HNSCC
  # Exclusión por gen diana primario: todos los fármacos cuyo target único
  # no tiene plausibilidad antitumoral
  exclude_single_target_genes:
    - "F2"         # Trombina — anticoagulantes (manejo sintomático)
    - "APP"        # Amiloide — anticuerpos Alzheimer (sin relevancia oncológica)
    - "CACNA2D1"   # Canal calcio α2δ — gabapentinoides analgésicos
    - "ADH1B"      # Alcohol deshidrogenasa — antídotos
    - "C5"         # Complemento C5 — anticuerpos anti-C5 (eculizumab etc.) — artefacto plasmático/contaminación; sin mecanismo antitumoral en HNSCC
    # Nota: FGA no se agrega aquí porque en el pipeline de_genes es "FGA|FGB|FGG"
    # (multi-target), no el string exacto "FGA". Esos fármacos se excluyen por nombre en exclusions.drugs.
